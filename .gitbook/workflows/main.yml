name: Sumario myLearningCorner

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - 'README.md'
      - 'SUMMARY.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generar Sumario
        run: |
          cat << 'EOF' > sumario.py
          import os
          import re
          import urllib.parse

          EXCLUDE_DIRS = {'.git', '.github', '.gitbook', 'node_modules'}
          EXCLUDE_FILES = {'README.md', 'SUMMARY.md', 'LICENSE', '.gitignore'}
          ALLOWED_EXTENSIONS = {'.md', '.pdf', '.odt', '.docx', '.xlsx', '.ods'}

          ICON_MAP = {
              '.md': '📄',
              '.pdf': '📕',
              '.docx': '📝',
              '.odt': '📝',
              '.xlsx': '📊',
              '.ods': '📊'
          }

          def sanitize_name(name):
              clean = re.sub(r'[\-_]+', ' ', name)
              return ' '.join(clean.split())

          def build_tree(dir_path, depth=0):
              lines = []
              try:
                  entries = sorted(os.listdir(dir_path))
              except OSError:
                  return lines

              for entry in entries:
                  if entry.startswith('.') or entry in EXCLUDE_FILES:
                      continue

                  full_path = os.path.join(dir_path, entry)
                  rel_path = os.path.relpath(full_path, '.')
                  indent = "  " * depth

                  if os.path.isdir(full_path):
                      if entry in EXCLUDE_DIRS:
                          continue
                      if has_valid_files(full_path):
                          folder_title = sanitize_name(entry)
                          lines.append(f"{indent}* **{folder_title}/**")
                          lines.extend(build_tree(full_path, depth + 1))

                  elif os.path.isfile(full_path):
                      ext = os.path.splitext(entry)[1].lower()
                      if ext in ALLOWED_EXTENSIONS:
                          encoded_url = urllib.parse.quote(rel_path.replace("\\", "/"))
                          raw_filename = os.path.splitext(entry)[0]
                          title = sanitize_name(raw_filename)
                          icon = ICON_MAP.get(ext, '📄')
                          lines.append(f"{indent}* {icon} [{title}]({encoded_url})")

              return lines

          def has_valid_files(dir_path):
              for root, dirs, files in os.walk(dir_path):
                  dirs[:] = [d for d in dirs if d not in EXCLUDE_DIRS and not d.startswith('.')]
                  for f in files:
                      if not f.startswith('.') and f not in EXCLUDE_FILES:
                          if os.path.splitext(f)[1].lower() in ALLOWED_EXTENSIONS:
                              return True
              return False

          index_content = [
              "# myLearningCorner: Table of Contents\n\n",
              "> *2026 07 22*\n\n",
              "---"
          ]
          tree_lines = build_tree('.')

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write('\n'.join(index_content + tree_lines) + '\n')

          EOF
          python sumario.py
          rm sumario.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-generate README index [skip ci]" && git push)
